<!doctype html>
<html lang="kk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ШАГОМЕР MVP</title>
    <style>
        :root {
            --bg: #f6f7fb;
            --card: #ffffff;
            --text: #121826;
            --muted: #6b7280;
            --border: #e5e7eb;
            --primary: #111827;
            --success: #15803d;
            --danger: #b91c1c;
            --warning: #b45309;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .app {
            width: 100%;
            max-width: 460px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 22px;
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
        }

        h1 {
            margin: 0 0 6px;
            font-size: 30px;
            letter-spacing: 0.04em;
            text-align: center;
        }

        .subtitle {
            margin: 0 0 20px;
            text-align: center;
            color: var(--muted);
            font-size: 14px;
        }

        .section {
            border-top: 1px solid var(--border);
            padding-top: 18px;
            margin-top: 18px;
        }

        label {
            display: block;
            margin: 12px 0 6px;
            font-size: 14px;
            color: var(--muted);
        }

        input {
            width: 100%;
            padding: 13px 14px;
            border: 1px solid var(--border);
            border-radius: 14px;
            font-size: 16px;
            outline: none;
        }

        input:focus { border-color: var(--primary); }

        button {
            width: 100%;
            border: 0;
            border-radius: 16px;
            padding: 14px 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 12px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-secondary {
            background: #eef2ff;
            color: #1f2937;
        }

        button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
        }

        .stat {
            background: #f9fafb;
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 16px;
            text-align: center;
        }

        .stat strong {
            display: block;
            font-size: 34px;
            line-height: 1.1;
        }

        .stat span {
            display: block;
            margin-top: 6px;
            color: var(--muted);
            font-size: 13px;
        }

        .status {
            margin-top: 14px;
            padding: 12px;
            border-radius: 14px;
            font-size: 14px;
            background: #f3f4f6;
            color: var(--muted);
            text-align: center;
        }

        .status.running {
            background: #dcfce7;
            color: var(--success);
        }

        .status.error {
            background: #fee2e2;
            color: var(--danger);
        }

        .hidden { display: none; }

        .small {
            color: var(--muted);
            font-size: 12px;
            line-height: 1.5;
            text-align: center;
            margin-top: 14px;
        }
    </style>
</head>
<body>
<main class="app">
    <h1>ШАГОМЕР</h1>
    <p class="subtitle">MVP: браузердегі қадам санағыш</p>

    <form id="registerForm">
        <label for="fullName">ФИО</label>
        <input id="fullName" name="fullName" required autocomplete="name" placeholder="Аты-жөніңіз" />

        <label for="year">Жыл / туған жыл</label>
        <input id="year" name="year" required inputmode="numeric" placeholder="Мысалы: 2001" />

        <label for="city">Қала</label>
        <input id="city" name="city" required placeholder="Мысалы: Алматы" />

        <label for="phone">Телефон</label>
        <input id="phone" name="phone" required inputmode="tel" autocomplete="tel" placeholder="+7..." />

        <button class="btn-primary" type="submit">Сақтау</button>
    </form>

    <section id="tracker" class="section hidden">
        <div class="status" id="statusBox">Дайын</div>

        <div class="stats">
            <div class="stat">
                <strong id="stepsValue">0</strong>
                <span>қадам</span>
            </div>
            <div class="stat">
                <strong id="metersValue">0</strong>
                <span>метр</span>
            </div>
        </div>

        <button id="startBtn" class="btn-success" type="button">СТАРТ</button>
        <button id="stopBtn" class="btn-danger" type="button" disabled>СТОП</button>
        <button id="resetBtn" class="btn-secondary" type="button">Қайта бастау</button>
        <button id="resetUserBtn" class="btn-secondary" type="button">Профильді өзгерту</button>

        <p class="small">iOS-та СТАРТ басқаннан кейін қозғалыс датчигіне рұқсат сұралады. Телефонда және HTTPS-та тестілеңіз.</p>
    </section>
</main>

<script>
    const STORAGE_KEY_USER = "shagomer_user";

    // Google Sheets келесі этапта қосылады.
    // Қазір false тұр, сондықтан ешқайда жібермейді.
    const GOOGLE_SHEETS_ENABLED = false;
    const GOOGLE_SCRIPT_URL = "PASTE_YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE";

    const STEP_LENGTH_METERS = 0.75;

    // Бұрынғы қарапайым threshold қолды сермегенде де санап кететін.
    // Қазір алгоритм қадамға ұқсас тұрақты ритмді ғана қабылдайды.
    const STEP_PEAK_THRESHOLD = 1.15;
    const STEP_MIN_INTERVAL_MS = 330;
    const STEP_MAX_INTERVAL_MS = 1200;
    const WALKING_CONFIRM_STEPS = 3;

    let steps = 0;
    let pendingSteps = 0;
    let isRunning = false;
    let lastStepTime = 0;
    let lastMagnitude = 0;
    let wasAbovePeak = false;
    let recentIntervals = [];

    const registerForm = document.getElementById("registerForm");
    const tracker = document.getElementById("tracker");
    const statusBox = document.getElementById("statusBox");
    const stepsValue = document.getElementById("stepsValue");
    const metersValue = document.getElementById("metersValue");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const resetBtn = document.getElementById("resetBtn");
    const resetUserBtn = document.getElementById("resetUserBtn");

    function getUser() {
        try {
            return JSON.parse(localStorage.getItem(STORAGE_KEY_USER));
        } catch {
            return null;
        }
    }

    function saveUser(user) {
        localStorage.setItem(STORAGE_KEY_USER, JSON.stringify(user));
    }

    function setStatus(message, type = "") {
        statusBox.className = `status ${type}`.trim();
        statusBox.textContent = message;
    }

    function getMeters() {
        return Math.round(steps * STEP_LENGTH_METERS);
    }

    function updateUI() {
        stepsValue.textContent = String(steps);
        metersValue.textContent = String(getMeters());
    }

    function resetStepAlgorithm() {
        pendingSteps = 0;
        lastStepTime = 0;
        lastMagnitude = 0;
        wasAbovePeak = false;
        recentIntervals = [];
    }

    function isWalkingRhythm(interval) {
        if (interval < STEP_MIN_INTERVAL_MS || interval > STEP_MAX_INTERVAL_MS) {
            return false;
        }

        recentIntervals.push(interval);
        if (recentIntervals.length > 4) {
            recentIntervals.shift();
        }

        if (recentIntervals.length < 2) {
            return true;
        }

        const average = recentIntervals.reduce((sum, value) => sum + value, 0) / recentIntervals.length;
        const maxDiff = Math.max(...recentIntervals.map(value => Math.abs(value - average)));

        // Қолды кездейсоқ сермеу көбіне тұрақсыз болады.
        // Адам жүргенде интервалдар бір-біріне жақындау келеді.
        return maxDiff < 280;
    }

    function acceptStep() {
        pendingSteps += 1;

        // Алғашқы 2-3 импульсті бірден көрсетпейміз.
        // Бұл бір орында қол сермеуден болатын жалған қадамдарды азайтады.
        if (pendingSteps >= WALKING_CONFIRM_STEPS) {
            if (steps === 0) {
                steps = pendingSteps;
            } else {
                steps += 1;
            }
            updateUI();
        }
    }

    function showTracker() {
        registerForm.classList.add("hidden");
        tracker.classList.remove("hidden");
        setStatus("Дайын");
        updateUI();
    }

    function showRegister(user = null) {
        registerForm.classList.remove("hidden");
        tracker.classList.add("hidden");

        if (user) {
            registerForm.fullName.value = user.fullName || "";
            registerForm.year.value = user.year || "";
            registerForm.city.value = user.city || "";
            registerForm.phone.value = user.phone || "";
        }
    }

    async function requestMotionPermission() {
        if (typeof DeviceMotionEvent === "undefined") {
            setStatus("Бұл браузер қозғалыс датчигін қолдамайды", "error");
            return false;
        }

        if (typeof DeviceMotionEvent.requestPermission === "function") {
            try {
                const result = await DeviceMotionEvent.requestPermission();
                return result === "granted";
            } catch (error) {
                console.error(error);
                return false;
            }
        }

        return true;
    }

    function handleMotion(event) {
        if (!isRunning) return;

        // acceleration — гравитациясыз үдеу. Қолдаса, соны қолданамыз.
        // Қолдамаса, accelerationIncludingGravity-ға fallback жасаймыз.
        const acc = event.acceleration || event.accelerationIncludingGravity;
        if (!acc) return;

        const x = acc.x || 0;
        const y = acc.y || 0;
        const z = acc.z || 0;
        const rawMagnitude = Math.sqrt(x * x + y * y + z * z);

        // Low-pass smoothing: датчик шуын азайтады.
        const magnitude = lastMagnitude * 0.75 + rawMagnitude * 0.25;
        const now = Date.now();

        const isPeak = magnitude > STEP_PEAK_THRESHOLD;
        const hasFallen = wasAbovePeak && magnitude < STEP_PEAK_THRESHOLD * 0.72;

        if (isPeak) {
            wasAbovePeak = true;
        }

        if (hasFallen) {
            const interval = lastStepTime ? now - lastStepTime : 0;

            if (!lastStepTime || isWalkingRhythm(interval)) {
                acceptStep();
                lastStepTime = now;
            } else {
                pendingSteps = 0;
                recentIntervals = [];
            }

            wasAbovePeak = false;
        }

        lastMagnitude = magnitude;
    }

    async function startTracking() {
        const allowed = await requestMotionPermission();

        if (!allowed) {
            setStatus("Датчикке рұқсат берілмеді", "error");
            return;
        }

        isRunning = true;
        resetStepAlgorithm();

        window.addEventListener("devicemotion", handleMotion);

        startBtn.disabled = true;
        stopBtn.disabled = false;
        setStatus("Жүріп жатыр", "running");
    }

    function stopTracking() {
        if (!isRunning) return;

        isRunning = false;
        window.removeEventListener("devicemotion", handleMotion);

        startBtn.disabled = false;
        stopBtn.disabled = true;
        setStatus("Тоқтады");

        // Google Sheets келесі этапта қосылады.
        // Қазір функция дайын, бірақ GOOGLE_SHEETS_ENABLED = false болғандықтан жібермейді.
        sendToGoogleSheetsIfEnabled();
    }

    function buildResultPayload() {
        return {
            createdAt: new Date().toISOString(),
            user: getUser(),
            steps,
            meters: getMeters(),
            source: "browser-devicemotion-mvp",
            userAgent: navigator.userAgent
        };
    }

    async function sendToGoogleSheetsIfEnabled() {
        if (!GOOGLE_SHEETS_ENABLED) return;

        if (!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL.includes("PASTE_YOUR")) {
            console.warn("Google Script URL қойылмаған");
            return;
        }

        const payload = buildResultPayload();

        try {
            await fetch(GOOGLE_SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            });
        } catch (error) {
            console.warn("Google Sheets жіберу қатесі:", error);
        }
    }

    function resetCounter() {
        stopTracking();
        steps = 0;
        resetStepAlgorithm();
        updateUI();
        setStatus("Қайта бастауға дайын");
    }

    registerForm.addEventListener("submit", (event) => {
        event.preventDefault();

        const user = {
            fullName: registerForm.fullName.value.trim(),
            year: registerForm.year.value.trim(),
            city: registerForm.city.value.trim(),
            phone: registerForm.phone.value.trim(),
            savedAt: new Date().toISOString()
        };

        saveUser(user);
        showTracker();
    });

    startBtn.addEventListener("click", startTracking);
    stopBtn.addEventListener("click", stopTracking);
    resetBtn.addEventListener("click", resetCounter);
    resetUserBtn.addEventListener("click", () => showRegister(getUser()));

    const savedUser = getUser();
    if (savedUser) {
        showTracker();
    } else {
        showRegister();
    }
</script>
</body>
</html>
